<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script>
	(function () {
		try {
			var isAuthed = localStorage.getItem("xennialCourseAuth") === "ok";
			document.documentElement.classList.add(isAuthed ? "auth-ok" : "auth-locked");
		} catch (e) {
			document.documentElement.classList.add("auth-locked");
		}
	})();
</script>
<title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
<meta name="description" content="{{ page.description | default: page.excerpt | default: site.description | strip_html | normalize_whitespace }}">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex, max-snippet:0, max-image-preview:none, max-video-preview:0, unavailable_after: 25 Jun 2030 00:00:00 GMT">
<meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex, max-snippet:0, max-image-preview:none, max-video-preview:0">
<meta name="bingbot" content="noindex, nofollow, noarchive, nosnippet, noimageindex, max-snippet:0, max-image-preview:none, max-video-preview:0">
<meta name="slurp" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="duckduckbot" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="referrer" content="no-referrer">
<!-- X-Robots-Tag is typically configured via HTTP headers on the hosting layer. -->
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
<link rel="stylesheet" href="https://cdn.lineicons.com/4.0/lineicons.css">
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
