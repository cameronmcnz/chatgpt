<div class="card card-soft h-100 day-card">
  <div class="card-body d-flex flex-column p-4">
    <span class="badge rounded-pill badge-soft w-fit mb-2">{{ include.day.day_label | default: include.day.title | split: ':' | first }}</span>
    <h3 class="h5 mb-2">{{ include.day.title }}</h3>
    <p class="text-muted small">{{ include.day.description | default: include.day.excerpt | truncate: 130 }}</p>
    <a class="mt-auto" href="{{ include.day.url | relative_url }}">Open day hub <i class="lni lni-arrow-right"></i></a>
  </div>
</div>
