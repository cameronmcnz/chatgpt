<div id="auth-gate" aria-hidden="true">
  <div class="auth-gate-backdrop"></div>
  <div class="auth-gate-card" role="dialog" aria-modal="true" aria-labelledby="auth-gate-title">
    <h1 id="auth-gate-title" class="h4 mb-2">Private Course Access</h1>
    <p class="text-muted small mb-3">Please enter the course username and password to continue.</p>
    <form id="auth-gate-form" novalidate>
      <div class="mb-2">
        <label for="auth-username" class="form-label small mb-1">Username</label>
        <input id="auth-username" class="form-control" type="text" autocomplete="username" required>
      </div>
      <div class="mb-2">
        <label for="auth-password" class="form-label small mb-1">Password</label>
        <input id="auth-password" class="form-control" type="password" autocomplete="current-password" required>
      </div>
      <p id="auth-gate-error" class="auth-gate-error small mb-3" aria-live="polite"></p>
      <button type="submit" class="btn btn-brand w-100">Enter Site</button>
    </form>
    <p class="small text-muted mt-3 mb-0">This challenge is only for discouraging public browsing.</p>
  </div>
</div>
